CONFIG_ZMK_KEYBOARD_NAME="KeyballBLE"

CONFIG_ZMK_BLE=y
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_INPUT_THREAD_STACK_SIZE=3072
CONFIG_ZMK_BLE_THREAD_STACK_SIZE=1024
CONFIG_ZMK_BLE_KEYBOARD_REPORT_QUEUE_SIZE=30
CONFIG_ZMK_BLE_CONSUMER_REPORT_QUEUE_SIZE=10

CONFIG_ZMK_SPLIT_BLE_CENTRAL_SPLIT_RUN_STACK_SIZE=1024
